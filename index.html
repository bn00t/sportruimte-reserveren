<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sportruimte</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f13;
      color: #f0f0f0;
      font-family: "DM Mono", "Fira Mono", "Courier New", monospace;
      min-height: 100vh;
      font-size: 15px;
    }
    #header {
      background: #181820;
      border-bottom: 2px solid #2a2a3a;
      padding: 16px 24px;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 10px;
      position: sticky; top: 0; z-index: 100;
    }
    #header h1 { font-size: 22px; font-weight: 700; color: #fff; }
    #header h1 span { font-size: 12px; color: #666; display: block; margin-top: 2px; letter-spacing: .08em; font-weight: 400; }
    #name-area { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    #name-area input {
      background: #0f0f13; border: 1.5px solid #3a3a50; border-radius: 8px;
      padding: 8px 14px; color: #fff; font-family: inherit; font-size: 15px;
      outline: none; width: 160px;
    }
    .btn { border: none; border-radius: 8px; padding: 8px 16px; font-family: inherit; font-size: 14px; cursor: pointer; }
    .btn-primary { background: #3A86FF; color: #fff; font-weight: 700; }
    .btn-secondary { background: #23232f; border: 1.5px solid #3a3a50; color: #ccc; }
    .btn-ghost { background: transparent; color: #666; }
    #user-pill { display: flex; align-items: center; gap: 8px; background: #0f0f13; border: 1.5px solid #2a2a3a; border-radius: 8px; padding: 6px 14px; }
    #user-dot { width: 11px; height: 11px; border-radius: 50%; }
    #user-name-label { font-size: 15px; color: #eee; }

    #week-nav {
      display: flex; align-items: center; justify-content: center; gap: 14px;
      padding: 12px 20px; background: #13131a; border-bottom: 1px solid #1e1e2a;
    }
    #week-nav button { background: #23232f; border: 1px solid #2a2a3a; border-radius: 6px; padding: 5px 14px; color: #ccc; cursor: pointer; font-family: inherit; font-size: 15px; }
    #week-nav #today-btn { background: transparent; border: none; color: #3A86FF; font-family: inherit; font-size: 14px; cursor: pointer; }
    #week-range { font-size: 14px; color: #999; min-width: 220px; text-align: center; }

    #sync-bar { font-size: 12px; text-align: center; padding: 5px; letter-spacing: .06em; transition: background .3s; }
    .sync-ok   { background: #06D6A022; color: #06D6A0; }
    .sync-busy { background: #FFB70322; color: #FFB703; }
    .sync-err  { background: #E8485522; color: #E84855; }

    #cal-wrapper { overflow-x: auto; padding-bottom: 60px; }

    /* ── Kalender grid ── */
    /*
      Opbouw per uur: 3 rijen
        rij A (height: 0)   → alleen het uurlabel, zweeft op de dikke lijn
        rij B (height: 36px) → blok XX:00–XX:30
        rij C (height: 36px) → blok XX:30–XX+1:00
      Kolommen: 58px tijdkolom + 7 dagkolommen
    */
    #cal {
      min-width: 420px;
      display: grid;
      grid-template-columns: 58px repeat(7, 1fr);
    }

    /* Dag-headers */
    .day-header {
      padding: 10px 2px; text-align: center; font-size: 12px; color: #888;
      border-left: 1px solid #1e1e2a;
      position: sticky; top: 0; background: #13131a; z-index: 10;
      border-bottom: 3px solid #3a3a55;
    }
    .day-header.today { color: #3A86FF; }
    .day-header .day-num { font-size: 20px; color: #eee; font-weight: 700; margin-top: 2px; }
    .day-header.today .day-num { color: #3A86FF; }

    /* Hoekcel */
    .corner { position: sticky; left: 0; top: 0; background: #13131a; z-index: 20; border-bottom: 3px solid #1e1e2a; }

    /* ── Tijdlabel (hoogte 0, zweeft op de uurlijn) ── */
    .time-label {
      height: 0;
      overflow: visible;
      position: sticky; left: 0;
      z-index: 6;
      pointer-events: none;
      background: transparent;
    }
    .time-label span {
      display: block;
      text-align: right;
      padding-right: 10px;
      font-size: 13px;
      font-weight: 400;
      color: #888;
      background: #0f0f13;
      line-height: 1;
      margin-top: -6px;
      white-space: nowrap;
      letter-spacing: .03em;
    }

    /* Lege cel naast uurlabel (hoogte 0, uurlijn) */
    .hour-spacer {
      height: 0;
      border-top: 1px solid #3a3a4e;
      overflow: visible;
    }

    /* Tijdkolom — geen border-bottom, alleen de rechter scheidingslijn */
    .time-border {
      height: 36px;
      position: sticky; left: 0;
      background: #0f0f13;
      border-right: 1px solid #3a3a4e;
      z-index: 5;
    }

    /* Slots */
    .slot {
      height: 36px;
      border-left: 1px solid #32323e;
      border-bottom: 1px solid #25253a; /* subtiel halve-uur lijntje alleen in dagkolommen */
      cursor: pointer;
      display: flex; align-items: center;
      padding-left: 5px;
      overflow: hidden;
      transition: background .1s;
      position: relative;
    }
    .slot.hour-border { border-bottom: 1px solid #3a3a4e; } /* iets zichtbaarder uurlijn */
    .slot.past { cursor: default; opacity: .35; }
    .slot:hover:not(.past):not(.taken) { background: #ffffff10; }
    .slot.taken { cursor: not-allowed; }
    .slot-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-right: 5px; }
    .slot-name { font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 80px; }

    /* Nu-lijn */
    .now-line {
      position: absolute; left: 0; right: 0; height: 2px;
      background: #E84855; z-index: 4; pointer-events: none;
    }
    .now-line::before {
      content: ""; position: absolute; left: -4px; top: -4px;
      width: 10px; height: 10px; border-radius: 50%; background: #E84855;
    }

    /* Toast */
    #toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: #23232f; border: 1.5px solid #3a3a50; border-radius: 10px;
      padding: 10px 20px; font-size: 14px; color: #eee;
      z-index: 200; pointer-events: none; white-space: nowrap;
      opacity: 0; transition: opacity .2s;
    }
    #toast.show { opacity: 1; }

    #no-name-bar {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: #23232f; border: 1.5px solid #3a3a50; border-radius: 12px;
      padding: 11px 20px; font-size: 14px; color: #888; z-index: 150;
    }

    /* Modal */
    #modal-overlay { display: none; position: fixed; inset: 0; background: #000000bb; z-index: 300; align-items: center; justify-content: center; }
    #modal-overlay.open { display: flex; }
    #modal { background: #181820; border: 1.5px solid #2a2a3a; border-radius: 16px; padding: 28px; width: 340px; max-width: 92vw; }
    #modal h2 { font-size: 16px; margin-bottom: 20px; color: #fff; }
    .field { margin-bottom: 16px; }
    .field label { font-size: 12px; color: #666; display: block; margin-bottom: 6px; letter-spacing: .08em; }
    .field select, .field input { width: 100%; background: #0f0f13; border: 1.5px solid #2a2a3a; border-radius: 8px; padding: 9px 12px; color: #fff; font-family: inherit; font-size: 15px; }
    .field.last { margin-bottom: 22px; }
    #modal-btns { display: flex; gap: 10px; }
    #modal-btns button { flex: 1; padding: 11px; border-radius: 8px; font-family: inherit; font-size: 15px; cursor: pointer; border: none; }
    #modal-cancel { background: #23232f; border: 1px solid #2a2a3a !important; color: #aaa; }
    #modal-confirm { background: #3A86FF; color: #fff; font-weight: 700; }
  </style>
</head>
<body>

<script>
  const CONFIG = { SCRIPT_URL: "https://script.google.com/macros/s/AKfycbzQ92mqilJRg8q3sv4koLKKLnY_wqmOR7cHvCXMzC7czaLdX9y4UZ14wUbLGVV59FiEGg/exec" };
</script>

<div id="header">
  <div><h1>🏋️ Sportruimte <span>GEDEELDE RESERVERINGEN</span></h1></div>
  <div id="name-area">
    <input id="name-input" placeholder="Jouw naam..." maxlength="20" />
    <button class="btn btn-primary" onclick="setName()">Ga →</button>
  </div>
</div>
<div id="sync-bar" class="sync-busy">⟳ laden...</div>
<div id="week-nav">
  <button onclick="prevWeek()">‹</button>
  <span id="week-range"></span>
  <button onclick="nextWeek()">›</button>
  <button id="today-btn" onclick="goToday()">vandaag</button>
</div>
<div id="cal-wrapper"><div id="cal"></div></div>
<div id="no-name-bar">👆 Stel je naam in om te reserveren</div>
<div id="toast"></div>

<div id="modal-overlay">
  <div id="modal">
    <h2>🔁 Terugkerende reservering</h2>
    <div class="field"><label>WEEKDAG</label>
      <select id="r-day">
        <option value="1">Maandag</option><option value="2">Dinsdag</option>
        <option value="3">Woensdag</option><option value="4">Donderdag</option>
        <option value="5">Vrijdag</option><option value="6">Zaterdag</option>
        <option value="0">Zondag</option>
      </select>
    </div>
    <div class="field"><label>STARTTIJD</label><select id="r-time"></select></div>
    <div class="field"><label>DUUR</label>
      <select id="r-dur">
        <option value="1">30 minuten</option><option value="2">1 uur</option>
        <option value="3">1,5 uur</option><option value="4">2 uur</option><option value="6">3 uur</option>
      </select>
    </div>
    <div class="field last"><label>AANTAL WEKEN</label><input id="r-weeks" type="number" value="4" min="1" max="52" /></div>
    <div id="modal-btns">
      <button id="modal-cancel" onclick="closeModal()">Annuleer</button>
      <button id="modal-confirm" onclick="confirmRecur()">Inplannen</button>
    </div>
  </div>
</div>

<script>
const START_HOUR = 5, END_HOUR = 23, SLOT_MIN = 30, SLOT_HEIGHT = 36;
const COLORS = ["#E84855","#3A86FF","#06D6A0","#FFB703","#9B5DE5","#F77F00","#00B4D8","#E76F51","#2EC4B6","#FF6B9D"];
const DAY_SHORT = ["Zo","Ma","Di","Wo","Do","Vr","Za"];

let reservations = {}, userName = "", weekOffset = 0;

const TIME_SLOTS = [];
for (let h = START_HOUR; h < END_HOUR; h++)
  for (let m = 0; m < 60; m += SLOT_MIN)
    TIME_SLOTS.push(`${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`);
// Verwijder 05:00 zodat we beginnen op 05:30
TIME_SLOTS.shift();

const rTimeEl = document.getElementById("r-time");
TIME_SLOTS.filter(t => t.endsWith(":00")).forEach(t => {
  const o = document.createElement("option"); o.value = t; o.textContent = t; rTimeEl.appendChild(o);
});

function capitalize(name) {
  if (!name) return "";
  return name.charAt(0).toUpperCase() + name.slice(1);
}

function getColor(name) {
  if (!name) return "#888";
  let h = 0;
  for (let i = 0; i < name.length; i++) h = name.charCodeAt(i) + ((h << 5) - h);
  return COLORS[Math.abs(h) % COLORS.length];
}
function formatDate(d) { return d.toISOString().split("T")[0]; }
function getMonday(offset=0) {
  const today = new Date(); today.setHours(0,0,0,0);
  const day = today.getDay();
  const monday = new Date(today);
  monday.setDate(today.getDate() - (day===0?6:day-1) + offset*7);
  return monday;
}
function getToday() { const d = new Date(); d.setHours(0,0,0,0); return d; }

async function loadFromSheet() {
  setSyncStatus("busy","⟳ laden...");
  try {
    const res = await fetch(`${CONFIG.SCRIPT_URL}?action=get`);
    if (!res.ok) throw new Error(res.status);
    reservations = await res.json();
    setSyncStatus("ok","✓ gesynchroniseerd");
  } catch(e) { setSyncStatus("err","✗ laden mislukt — controleer Script URL"); console.error(e); }
  renderCal();
}

async function saveToSheet(key, owner) {
  setSyncStatus("busy","⟳ opslaan...");
  try {
    const res = await fetch(CONFIG.SCRIPT_URL, {
      method:"POST", headers:{"Content-Type":"text/plain"},
      body: JSON.stringify({key, owner}),
    });
    if (!res.ok) throw new Error(res.status);
    setSyncStatus("ok","✓ opgeslagen");
  } catch(e) { setSyncStatus("err","✗ opslaan mislukt"); await loadFromSheet(); }
}

function setSyncStatus(type, msg) {
  const el = document.getElementById("sync-bar");
  el.className = `sync-${type}`; el.textContent = msg;
}

function setName() {
  const val = document.getElementById("name-input").value.trim();
  if (!val) return;
  userName = val.toLowerCase();
  document.getElementById("name-area").innerHTML = `
    <div id="user-pill">
      <div id="user-dot" style="background:${getColor(userName)}"></div>
      <span id="user-name-label">${val}</span>
    </div>
    <button class="btn btn-secondary" onclick="openModal()">🔁 Herhaal</button>
    <button class="btn btn-ghost" onclick="switchName()">Wissel</button>
  `;
  document.getElementById("no-name-bar").style.display = "none";
  renderCal();
}
function switchName() {
  userName = "";
  document.getElementById("name-area").innerHTML = `
    <input id="name-input" placeholder="Jouw naam..." maxlength="20" />
    <button class="btn btn-primary" onclick="setName()">Ga →</button>
  `;
  document.getElementById("name-input").addEventListener("keydown", e => { if (e.key==="Enter") setName(); });
  document.getElementById("no-name-bar").style.display = "";
  renderCal();
}
document.getElementById("name-input").addEventListener("keydown", e => { if (e.key==="Enter") setName(); });

function prevWeek() { weekOffset--; renderCal(); }
function nextWeek() { weekOffset++; renderCal(); }
function goToday()  { weekOffset=0; renderCal(); scrollToNow(); }

async function toggleSlot(dateStr, time) {
  if (!userName) return;
  const key = `${dateStr}__${time}`;
  const owner = reservations[key];
  const ownerLower = owner ? owner.toLowerCase() : null;
  if (ownerLower === userName) {
    delete reservations[key]; showToast("Reservering verwijderd"); renderCal(); await saveToSheet(key,"");
  } else if (owner) {
    showToast(`Al gereserveerd door ${capitalize(owner)}`);
  } else {
    reservations[key] = userName; showToast("Gereserveerd! ✓"); renderCal(); await saveToSheet(key, userName);
  }
}

function openModal()  { document.getElementById("modal-overlay").classList.add("open"); }
function closeModal() { document.getElementById("modal-overlay").classList.remove("open"); }

async function confirmRecur() {
  if (!userName) return;
  const targetDay = parseInt(document.getElementById("r-day").value);
  const startTime = document.getElementById("r-time").value;
  const numSlots  = parseInt(document.getElementById("r-dur").value);
  const numWeeks  = parseInt(document.getElementById("r-weeks").value);
  const today = getToday();
  const daysUntil = (targetDay - today.getDay() + 7) % 7;
  const baseDate = new Date(today);
  baseDate.setDate(today.getDate() + daysUntil);
  const startIdx = TIME_SLOTS.indexOf(startTime);
  const batch = [];
  for (let w=0; w<numWeeks; w++) {
    const d = new Date(baseDate); d.setDate(baseDate.getDate()+w*7);
    const dateStr = formatDate(d);
    for (let s=0; s<numSlots; s++) {
      const idx = startIdx+s; if (idx>=TIME_SLOTS.length) break;
      const key = `${dateStr}__${TIME_SLOTS[idx]}`;
      if (!reservations[key]) { reservations[key]=userName; batch.push(key); }
    }
  }
  closeModal(); showToast(`${batch.length} blokken ingepland ✓`); renderCal();
  if (batch.length>0) {
    setSyncStatus("busy","⟳ opslaan...");
    try {
      const res = await fetch(CONFIG.SCRIPT_URL, {method:"POST", headers:{"Content-Type":"text/plain"}, body:JSON.stringify({batch:batch.map(k=>({key:k,owner:userName}))})});
      if (!res.ok) throw new Error(res.status);
      setSyncStatus("ok","✓ opgeslagen");
    } catch(e) { setSyncStatus("err","✗ opslaan mislukt"); await loadFromSheet(); }
  }
}

let toastTimer;
function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent=msg; el.classList.add("show");
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove("show"),2400);
}

function scrollToNow() {
  if (weekOffset!==0) return;
  const now = new Date();
  const totalMin = (now.getHours()-START_HOUR)*60+now.getMinutes();
  if (totalMin<0) return;
  // elke uur = 1 label-rij (height 0) + 2 slot-rijen (height 36) = 72px per uur
  const hoursPast = totalMin/60;
  const scrollY = 130 + hoursPast*72 - 72; // 1 uur eerder
  window.scrollTo({top:Math.max(0,scrollY), behavior:"smooth"});
}

function renderCal() {
  const cal = document.getElementById("cal");
  cal.innerHTML = "";

  const monday = getMonday(weekOffset);
  const today  = getToday();
  const now    = new Date();
  const days   = Array.from({length:7},(_,i)=>{ const d=new Date(monday); d.setDate(monday.getDate()+i); return d; });

  const fmt = d => d.toLocaleDateString("nl-NL",{day:"numeric",month:"long"});
  document.getElementById("week-range").textContent =
    `${fmt(days[0])} – ${days[6].toLocaleDateString("nl-NL",{day:"numeric",month:"long",year:"numeric"})}`;

  // Hoek
  const corner = document.createElement("div"); corner.className="corner"; cal.appendChild(corner);
  // Dag-headers
  days.forEach(d => {
    const isToday = formatDate(d)===formatDate(today);
    const cell = document.createElement("div");
    cell.className="day-header"+(isToday?" today":"");
    cell.innerHTML=`<div>${DAY_SHORT[d.getDay()]}</div><div class="day-num">${d.getDate()}</div>`;
    cal.appendChild(cell);
  });

  const nowMin = (now.getHours()-START_HOUR)*60+now.getMinutes();
  const isThisWeek = weekOffset===0;

  // Per uur: label-rij (height 0) + 2 slotrijden
  for (let h=START_HOUR; h<END_HOUR; h++) {
    const hourStr = `${String(h).padStart(2,"0")}:00`;
    const halfStr = `${String(h).padStart(2,"0")}:30`;
    const isFirstHour = h === START_HOUR;
    const isLastHour = h === END_HOUR-1;

    // ── Rij A: uurlabel (height 0) — altijd tonen, ook voor eerste uur ──
    const labelDiv = document.createElement("div");
    labelDiv.className = "time-label";
    const span = document.createElement("span");
    // Eerste uur: label toont 05:30 want dat is het eerste zichtbare blok
    span.textContent = isFirstHour ? halfStr : hourStr;
    labelDiv.appendChild(span);
    cal.appendChild(labelDiv);

    days.forEach(() => {
      const sp = document.createElement("div");
      sp.className = "hour-spacer";
      cal.appendChild(sp);
    });

    // ── Rij B: blok XX:00–XX:30 — overslaan voor eerste uur ──
    if (!isFirstHour) {
      const border1 = document.createElement("div");
      border1.className = "time-border";
      cal.appendChild(border1);

      days.forEach(d => {
        const dateStr = formatDate(d);
        const key = `${dateStr}__${hourStr}`;
        cal.appendChild(makeSlot(key, d, hourStr, today, now, nowMin, isThisWeek, false));
      });
    }

    // ── Rij C: blok XX:30–XX+1:00 ──
    const border2 = document.createElement("div");
    border2.className = "time-border" + (isLastHour ? " is-last" : "");
    cal.appendChild(border2);

    days.forEach(d => {
      const dateStr = formatDate(d);
      const key = `${dateStr}__${halfStr}`;
      cal.appendChild(makeSlot(key, d, halfStr, today, now, nowMin, isThisWeek, true));
    });
  }
}

function makeSlot(key, d, time, today, now, nowMin, isThisWeek, isHalfHour) {
  const owner = reservations[key];
  const ownerLower = owner ? owner.toLowerCase() : null;
  const isMe = userName!=="" && ownerLower===userName;
  const isPast = d < today;
  const isLastOfHour = isHalfHour;

  const slot = document.createElement("div");
  slot.className = "slot"
    + (isLastOfHour ? " hour-border" : "")
    + (isPast ? " past" : "")
    + (owner && !isMe ? " taken" : "")
    + (isMe ? " mine" : "");
  slot.style.position = "relative";

  if (owner) {
    const color = getColor(ownerLower);
    slot.style.background = isMe ? `${color}33` : `${color}22`;
    slot.innerHTML = `<div class="slot-dot" style="background:${color}"></div><span class="slot-name" style="color:${color};font-weight:${isMe?700:400}">${capitalize(owner)}</span>`;
  }
  if (!isPast) {
    slot.title = owner
      ? (isMe ? `Klik om te verwijderen (${time})` : `${capitalize(owner)} — ${time}`)
      : (userName ? `Reserveer ${time}` : "Stel eerst je naam in");
    slot.onclick = () => toggleSlot(formatDate(d), time);
  }

  // Nu-lijn
  if (isThisWeek && formatDate(d)===formatDate(today)) {
    const [hh,mm] = time.split(":").map(Number);
    const slotStartMin = (hh-parseInt(time.split(":")[0].replace(/^0/,"") || "0"))*60; // relative
    // bereken of nowMin valt in dit slot
    const slotMin = (hh - (parseInt(time.split(":")[0]) || hh))*60 + mm;
    const absoluteSlotMin = (hh - 0)*60 + mm - 0; // minuten vanaf middernacht maar we rekenen vanaf START_HOUR
    const slotStartAbs = (hh - START_HOUR)*60 + (isHalfHour ? 30 : 0);
    const slotEndAbs = slotStartAbs + 30;
    if (nowMin >= slotStartAbs && nowMin < slotEndAbs) {
      const pct = ((nowMin - slotStartAbs) / 30 * 100).toFixed(1);
      const line = document.createElement("div");
      line.className = "now-line"; line.style.top = `${pct}%`;
      slot.appendChild(line);
    }
  }

  return slot;
}

renderCal();
loadFromSheet().then(()=>scrollToNow());
setInterval(loadFromSheet, 60_000);
setInterval(renderCal, 60_000);
</script>

</body>
</html>
